[build]
builder = "NIXPACKS"
nixpacksPlan = """
{ pkgs }: {
  packages = with pkgs; [ nodejs_20 ];
  env = {
    NODE_ENV = "production";
  };
}
"""

[nixpacks]
startCommand = "node packages/api/dist/server.js"

[deploy]
startCommand = "node packages/api/dist/server.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
