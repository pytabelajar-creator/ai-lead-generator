services:
  postgres:
    image: postgres:16-alpine
    container_name: leadgen-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: leadgen
      POSTGRES_PASSWORD: leadgen_secret
      POSTGRES_DB: leadgen
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leadgen"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: leadgen-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory-policy noeviction
      --appendonly yes
      --requirepass redis_secret
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_secret", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
